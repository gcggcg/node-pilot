name: Go CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  GO_VERSION: '1.25.7'
  GO111MODULE: 'on'

jobs:

  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .  # 确保在项目根目录执行
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史，有助于Go模块
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Check go.mod
      run: |
        echo "当前目录结构:"
        find . -name "go.mod" -o -name "main.go" | sort
        echo ""
        if [ -f "go.mod" ]; then
          echo "✅ 找到 go.mod 文件"
          cat go.mod
        else
          echo "❌ 未找到 go.mod 文件"
          # 自动创建 go.mod
          go mod init node-pilot || true
        fi
    
    - name: Download dependencies
      run: |
        go mod download
        go mod verify
        echo "依赖下载完成"
    
    - name: List modules
      run: go list -m all
    
    - name: Check imports
      run: go list ./...
    
    - name: Build binary
      run: go build -o node-pilot ./backend/cmd/server/main.go
